name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/client/package-lock.json

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install frontend dependencies
        working-directory: app/client
        run: npm ci

      - name: Build frontend
        working-directory: app/client
        run: npm run build
        env:
          VITE_API_URL: /api

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 137.184.143.235
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            cd /opt/cutline
            sudo git config --global --add safe.directory /opt/cutline
            sudo git pull origin main
            sudo git reset --hard origin/main

            # Install and build frontend
            cd app/client
            sudo npm ci
            sudo npm run build

            # Install backend dependencies
            cd ../server
            sudo bun install

            # Configure nginx for SPA + PWA
            sudo tee /etc/nginx/sites-available/cutline > /dev/null <<'NGINX'
            server {
                listen 80;
                server_name cutline.mekaelturner.com;

                root /opt/cutline/app/client/dist;
                index index.html;

                # Service worker must never be cached
                location = /sw.js {
                    add_header Cache-Control "no-cache, no-store, must-revalidate";
                    add_header Pragma "no-cache";
                    add_header Expires "0";
                    types { application/javascript js; }
                }

                # Static assets with content hash can be cached aggressively
                location /assets/ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                }

                # All other routes serve index.html (SPA)
                location / {
                    try_files $uri $uri/ /index.html;
                }
            }
            NGINX

            sudo ln -sf /etc/nginx/sites-available/cutline /etc/nginx/sites-enabled/cutline
            sudo nginx -t && sudo systemctl reload nginx

            # Restart PM2 process
            sudo pm2 restart cutline-api || sudo PORT=3600 pm2 start src/index.ts --name cutline-api
